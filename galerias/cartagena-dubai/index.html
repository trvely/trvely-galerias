  let x0=null; const lb=document.getElementById('lb');
  lb.addEventListener('touchstart',e=>x0=e.touches[0].clientX,{passive:true});
  lb.addEventListener('touchend',e=>{ if(x0===null)return; const dx=e.changedTouches[0].clientX-x0; if(Math.abs(dx)>45)LB.nav(dx<0?1:-1); x0=null; },{passive:true});
